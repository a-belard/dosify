# Robot connectivity
robot_ip: "172.20.85.100"

# Pose names on the Ned (see config/poses.yaml for hardcoded joints)
vision_pose: pill-view
pickup_pose: pill-pickup

pill_types:
  - blue
  - green
  - white
  - blue_green
  - blue_white
  - green_white

patient_boxes:
  person_1:
    prefix: person-1
    anchor_days: [monday, tuesday]

# Tool
tool_id: 31
vacuum_speed: 400
z_place: 0.02

# Motion
lock_j6: true
safe_speed_factor: 1.0
min_duration: 1.5
default_move_duration: 3.0

# Vision
camera_topic: "/niryo_robot_vision/compressed_video_stream"
observation_settle_sec: 0.5
pick_dwell_sec: 0.35

# Demo
board_view_pose: "tictactoe-vision"
